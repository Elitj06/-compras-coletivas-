<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compras Coletivas - Vida Forte</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .user-info {
            background: #f8f9fa;
            padding: 20px 30px;
            border-bottom: 2px solid #e9ecef;
        }

        .user-info input {
            width: 100%;
            max-width: 400px;
            padding: 12px 20px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 10px;
            margin-top: 10px;
        }

        .user-info input:focus {
            outline: none;
            border-color: #667eea;
        }

        .tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #e9ecef;
            overflow-x: auto;
        }

        .tab {
            padding: 15px 30px;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 16px;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
            white-space: nowrap;
        }

        .tab:hover {
            background: #e9ecef;
        }

        .tab.active {
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }

        .content {
            padding: 30px;
        }

        .search-box {
            margin-bottom: 30px;
        }

        .search-box input {
            width: 100%;
            padding: 15px 20px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 10px;
        }

        .search-box input:focus {
            outline: none;
            border-color: #667eea;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .product-card {
            background: #f8f9fa;
            border-radius: 15px;
            padding: 20px;
            transition: all 0.3s;
            border: 2px solid transparent;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border-color: #667eea;
        }

        .product-code {
            color: #667eea;
            font-weight: bold;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .product-name {
            font-size: 1.1em;
            margin-bottom: 10px;
            color: #333;
            font-weight: 600;
        }

        .product-price {
            font-size: 1.5em;
            color: #28a745;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .product-embalagem {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 15px;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 15px;
        }

        .quantity-control button {
            width: 40px;
            height: 40px;
            border: none;
            background: #667eea;
            color: white;
            border-radius: 8px;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .quantity-control button:hover {
            background: #764ba2;
            transform: scale(1.1);
        }

        .quantity-control input {
            width: 60px;
            text-align: center;
            padding: 10px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
        }

        .cart-summary {
            position: sticky;
            bottom: 0;
            background: white;
            padding: 20px 30px;
            border-top: 2px solid #e9ecef;
            box-shadow: 0 -5px 20px rgba(0,0,0,0.1);
        }

        .cart-summary-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .cart-total {
            font-size: 1.5em;
            font-weight: bold;
            color: #333;
        }

        .cart-items-count {
            color: #667eea;
            font-weight: 600;
        }

        .btn {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-success {
            background: #28a745;
            color: white;
        }

        .btn-danger {
            background: #dc3545;
            color: white;
        }

        .my-cart-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-login {
            max-width: 400px;
            margin: 50px auto;
            text-align: center;
        }

        .admin-login input {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .report-section {
            margin-bottom: 30px;
        }

        .report-card {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        .report-header {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }

        .report-item {
            padding: 10px;
            border-bottom: 1px solid #ddd;
            display: flex;
            justify-content: space-between;
        }

        .report-item:last-child {
            border-bottom: none;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background: #667eea;
            color: white;
            font-weight: 600;
        }

        tr:hover {
            background: #f8f9fa;
        }

        .hidden {
            display: none;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8em;
            }

            .products-grid {
                grid-template-columns: 1fr;
            }

            .cart-summary-content {
                flex-direction: column;
                text-align: center;
            }

            .tabs {
                flex-wrap: wrap;
            }

            .tab {
                flex: 1;
                min-width: 120px;
            }
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🛒 Compras Coletivas</h1>
            <p>Vida Forte Nutrientes - Janeiro 2026</p>
        </div>

        <div class="user-info" id="userInfoSection">
            <label for="userName"><strong>Seu Nome:</strong></label>
            <input type="text" id="userName" placeholder="Digite seu nome completo" />
        </div>

        <div class="tabs">
            <button class="tab active" data-tab="produtos">📦 Produtos</button>
            <button class="tab" data-tab="meu-pedido">🛍️ Meu Pedido</button>
            <button class="tab" data-tab="admin">🔐 Administração</button>
        </div>

        <div class="content">
            <!-- Tab Produtos -->
            <div id="tab-produtos" class="tab-content">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="🔍 Buscar produtos por nome ou código..." />
                </div>
                <div id="productsGrid" class="products-grid"></div>
            </div>

            <!-- Tab Meu Pedido -->
            <div id="tab-meu-pedido" class="tab-content hidden">
                <div id="myCartContent"></div>
            </div>

            <!-- Tab Admin -->
            <div id="tab-admin" class="tab-content hidden">
                <div id="adminLoginSection" class="admin-login">
                    <h2>Acesso Administrativo</h2>
                    <input type="password" id="adminPassword" placeholder="Senha do administrador" />
                    <button class="btn btn-primary" onclick="app.loginAdmin()">Entrar</button>
                </div>
                <div id="adminContent" class="hidden"></div>
            </div>
        </div>

        <div class="cart-summary">
            <div class="cart-summary-content">
                <div>
                    <span class="cart-items-count" id="cartItemsCount">0 itens</span>
                    <span class="cart-total" id="cartTotal"> | Total: R$ 0,00</span>
                </div>
                <button class="btn btn-primary" onclick="app.finalizeOrder()">Finalizar Pedido</button>
            </div>
        </div>
    </div>

    <script src="produtos.js"></script>
    <script src="app.js"></script>
</body>
</html>
