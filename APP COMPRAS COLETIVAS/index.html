<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compras Coletivas - Vida Forte Nutrientes</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FAF9F6;
            --bg-card: #FFFFFF;
            --bg-surface: #F3F1EC;
            --text-primary: #1A1A19;
            --text-secondary: #6B6B67;
            --text-muted: #9C9C96;
            --accent: #2D6A4F;
            --accent-light: #40916C;
            --accent-bg: #D8F3DC;
            --accent-bg-subtle: #EDF7F0;
            --border: #E8E6E1;
            --border-light: #F0EEE9;
            --danger: #C1292E;
            --danger-bg: #FDECEA;
            --warning: #E07C24;
            --warning-bg: #FFF4E5;
            --success: #2D6A4F;
            --success-bg: #D8F3DC;
            --shadow-sm: 0 1px 3px rgba(26,26,25,0.06);
            --shadow-md: 0 4px 12px rgba(26,26,25,0.08);
            --shadow-lg: 0 8px 30px rgba(26,26,25,0.12);
            --radius: 12px;
            --radius-sm: 8px;
            --font-display: 'Playfair Display', Georgia, serif;
            --font-body: 'DM Sans', -apple-system, sans-serif;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: var(--font-body);
            background: var(--bg);
            color: var(--text-primary);
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }
        .header {
            background: var(--accent);
            color: white;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 2px 20px rgba(45,106,79,0.25);
        }
        .header-inner {
            max-width: 1200px;
            margin: 0 auto;
            padding: 14px 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
        }
        .logo { display: flex; align-items: center; gap: 12px; }
        .logo-icon {
            width: 40px; height: 40px;
            background: rgba(255,255,255,0.15);
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
        }
        .logo h1 {
            font-family: var(--font-display);
            font-size: 1.3rem; font-weight: 700;
            letter-spacing: -0.02em; line-height: 1.1;
        }
        .logo-sub {
            font-size: 0.7rem; opacity: 0.75;
            letter-spacing: 0.04em; text-transform: uppercase;
        }
        .header-user {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255,255,255,0.12);
            border-radius: var(--radius-sm);
            padding: 6px 14px;
        }
        .header-user svg { opacity: 0.7; flex-shrink: 0; }
        #userName {
            background: none; border: none; color: white;
            font-size: 0.88rem; font-family: var(--font-body);
            width: 170px; outline: none;
        }
        #userName::placeholder { color: rgba(255,255,255,0.5); }
        .tabs-wrapper {
            background: var(--bg-card);
            border-bottom: 1px solid var(--border);
            position: sticky; top: 68px; z-index: 90;
        }
        .tabs {
            max-width: 1200px; margin: 0 auto;
            display: flex; overflow-x: auto;
            scrollbar-width: none;
        }
        .tabs::-webkit-scrollbar { display: none; }
        .tab {
            padding: 13px 24px; cursor: pointer; border: none; background: none;
            font-size: 0.86rem; font-weight: 500; color: var(--text-secondary);
            transition: var(--transition); white-space: nowrap;
            position: relative; font-family: var(--font-body);
        }
        .tab:hover { color: var(--accent); }
        .tab.active { color: var(--accent); font-weight: 600; }
        .tab.active::after {
            content: ''; position: absolute;
            bottom: 0; left: 12px; right: 12px;
            height: 2.5px; background: var(--accent);
            border-radius: 2px 2px 0 0;
        }
        .content {
            max-width: 1200px; margin: 0 auto;
            padding: 24px 24px 120px;
        }
        .hidden { display: none !important; }
        .search-wrapper { position: relative; margin-bottom: 20px; }
        .search-wrapper svg {
            position: absolute; left: 16px; top: 50%;
            transform: translateY(-50%); color: var(--text-muted);
        }
        #searchInput {
            width: 100%; padding: 13px 16px 13px 46px;
            font-size: 0.92rem; font-family: var(--font-body);
            border: 1.5px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg-card); color: var(--text-primary);
            transition: var(--transition);
        }
        #searchInput:focus {
            outline: none; border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(45,106,79,0.1);
        }
        #searchInput::placeholder { color: var(--text-muted); }
        .search-count {
            font-size: 0.8rem; color: var(--text-muted);
            margin-bottom: 16px;
        }
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 14px;
        }
        .product-card {
            background: var(--bg-card);
            border-radius: var(--radius);
            border: 1.5px solid var(--border-light);
            padding: 18px 20px;
            transition: var(--transition);
            animation: fadeUp 0.4s ease both;
        }
        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .product-card:hover {
            border-color: var(--accent);
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }
        .product-card.has-qty {
            border-color: var(--accent);
            background: var(--accent-bg-subtle);
        }
        .product-card-header {
            display: flex; justify-content: space-between;
            align-items: flex-start; margin-bottom: 8px;
        }
        .product-code {
            font-size: 0.7rem; font-weight: 600;
            color: var(--accent); background: var(--accent-bg-subtle);
            padding: 2px 8px; border-radius: 6px;
            letter-spacing: 0.04em;
        }
        .product-embalagem {
            font-size: 0.7rem; color: var(--text-muted);
            background: var(--bg-surface);
            padding: 2px 8px; border-radius: 6px;
        }
        .product-name {
            font-size: 0.88rem; margin-bottom: 10px;
            color: var(--text-primary); font-weight: 500;
            line-height: 1.3; min-height: 2.6em;
        }
        .product-price {
            font-family: var(--font-display);
            font-size: 1.4rem; color: var(--accent);
            font-weight: 700; margin-bottom: 14px;
        }
        .quantity-control {
            display: flex; align-items: center; gap: 8px;
        }
        .qty-btn {
            width: 36px; height: 36px;
            border: 1.5px solid var(--border);
            background: var(--bg-card); color: var(--text-primary);
            border-radius: var(--radius-sm);
            font-size: 18px; cursor: pointer;
            transition: var(--transition);
            display: flex; align-items: center; justify-content: center;
        }
        .qty-btn:hover {
            background: var(--accent); color: white;
            border-color: var(--accent);
        }
        .qty-btn:active { transform: scale(0.9); }
        .qty-input {
            width: 54px; text-align: center;
            padding: 7px 4px; font-size: 0.92rem;
            font-family: var(--font-body); font-weight: 600;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            color: var(--text-primary); background: var(--bg-surface);
        }
        .qty-input:focus { outline: none; border-color: var(--accent); }
        .product-card.has-qty .qty-input {
            background: white; border-color: var(--accent);
            color: var(--accent);
        }
        .cart-summary {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: var(--bg-card);
            border-top: 1.5px solid var(--border);
            box-shadow: 0 -4px 20px rgba(26,26,25,0.1);
            z-index: 80; transition: transform 0.3s ease;
        }
        .cart-summary.empty { transform: translateY(100%); }
        .cart-summary-content {
            max-width: 1200px; margin: 0 auto;
            padding: 14px 24px;
            display: flex; justify-content: space-between;
            align-items: center; gap: 16px;
        }
        .cart-info { display: flex; align-items: center; gap: 16px; }
        .cart-items-count { font-size: 0.85rem; color: var(--text-secondary); }
        .cart-items-count strong { color: var(--accent); font-weight: 700; }
        .cart-total {
            font-family: var(--font-display);
            font-size: 1.25rem; font-weight: 700;
        }
        .btn {
            padding: 10px 20px; font-size: 0.86rem; font-weight: 600;
            border: none; border-radius: var(--radius-sm);
            cursor: pointer; transition: var(--transition);
            font-family: var(--font-body);
            display: inline-flex; align-items: center; gap: 6px;
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: var(--accent-light); box-shadow: 0 4px 12px rgba(45,106,79,0.3); }
        .btn-secondary { background: var(--bg-surface); color: var(--text-primary); border: 1.5px solid var(--border); }
        .btn-secondary:hover { border-color: var(--accent); color: var(--accent); }
        .btn-danger { background: var(--danger); color: white; }
        .btn-danger:hover { background: #a82226; }
        .btn-success { background: var(--success); color: white; }
        .btn-sm { padding: 6px 14px; font-size: 0.78rem; }
        .cart-item {
            background: var(--bg-card);
            border: 1.5px solid var(--border-light);
            padding: 14px 18px; border-radius: var(--radius);
            margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            transition: var(--transition);
            animation: fadeUp 0.3s ease both;
        }
        .cart-item:hover { border-color: var(--border); box-shadow: var(--shadow-sm); }
        .cart-item-info h4 { font-size: 0.88rem; font-weight: 500; margin-bottom: 3px; }
        .cart-item-info small { color: var(--text-muted); font-size: 0.78rem; }
        .cart-item-right { text-align: right; display: flex; align-items: center; gap: 14px; }
        .cart-item-subtotal {
            font-family: var(--font-display);
            font-weight: 700; font-size: 1rem; color: var(--accent);
        }
        .btn-remove {
            width: 30px; height: 30px;
            border: 1.5px solid var(--border);
            background: white; border-radius: var(--radius-sm);
            cursor: pointer; display: flex;
            align-items: center; justify-content: center;
            transition: var(--transition); color: var(--text-muted);
        }
        .btn-remove:hover { background: var(--danger-bg); border-color: var(--danger); color: var(--danger); }
        .order-total-bar {
            margin-top: 20px; padding: 18px 24px;
            background: var(--accent); color: white;
            border-radius: var(--radius);
            display: flex; justify-content: space-between; align-items: center;
        }
        .order-total-bar h2 { font-family: var(--font-display); font-size: 1.3rem; }
        .user-badge {
            background: var(--accent-bg); color: var(--accent);
            padding: 10px 16px; border-radius: var(--radius-sm);
            margin-bottom: 20px; font-size: 0.86rem;
            display: flex; align-items: center; gap: 8px;
        }
        .admin-login {
            max-width: 360px; margin: 60px auto; text-align: center;
        }
        .admin-login h2 {
            font-family: var(--font-display);
            font-size: 1.4rem; margin-bottom: 6px;
        }
        .admin-login p { color: var(--text-secondary); font-size: 0.86rem; margin-bottom: 24px; }
        .admin-login input {
            width: 100%; padding: 13px 16px;
            font-size: 0.92rem; font-family: var(--font-body);
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            margin-bottom: 14px; text-align: center;
        }
        .admin-login input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(45,106,79,0.1); }
        .admin-toolbar { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 24px; }
        .report-section { margin-bottom: 28px; }
        .report-card {
            background: var(--bg-card);
            border: 1.5px solid var(--border-light);
            border-radius: var(--radius); overflow: hidden;
        }
        .report-header {
            font-size: 0.95rem; font-weight: 600;
            padding: 14px 18px; background: var(--bg-surface);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 8px;
        }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 10px 14px; text-align: left; font-size: 0.82rem; }
        th {
            background: var(--accent); color: white;
            font-weight: 500; font-size: 0.75rem;
            text-transform: uppercase; letter-spacing: 0.04em;
        }
        td { border-bottom: 1px solid var(--border-light); }
        tr:last-child td { border-bottom: none; }
        tr:hover td { background: var(--accent-bg-subtle); }
        .total-row td { background: var(--accent-bg) !important; font-weight: 700; color: var(--accent); }
        .user-section-header {
            padding: 12px 18px; background: var(--bg-surface);
            font-weight: 600; font-size: 0.88rem; color: var(--accent);
            border-bottom: 1px solid var(--border);
        }
        .user-total-row {
            padding: 10px 18px; text-align: right; font-weight: 600;
            font-size: 0.85rem; background: var(--accent-bg-subtle);
            border-bottom: 1.5px solid var(--border);
        }
        .alert {
            padding: 12px 16px; border-radius: var(--radius-sm);
            margin-bottom: 16px; font-size: 0.86rem;
            display: flex; align-items: center; gap: 8px;
        }
        .alert-info { background: #EBF5FB; color: #1B4F72; border: 1px solid #AED6F1; }
        .alert-success { background: var(--success-bg); color: var(--success); border: 1px solid #B7E4C7; }
        .toast-container {
            position: fixed; top: 76px; right: 20px;
            z-index: 999; display: flex; flex-direction: column; gap: 8px;
        }
        .toast {
            background: var(--bg-card); border: 1.5px solid var(--border);
            border-radius: var(--radius-sm); padding: 11px 16px;
            font-size: 0.84rem; display: flex; align-items: center;
            gap: 8px; box-shadow: var(--shadow-lg);
            animation: toastIn 0.35s ease, toastOut 0.3s ease 2.7s forwards;
            max-width: 320px;
        }
        .toast-success { border-left: 3px solid var(--success); }
        .toast-error { border-left: 3px solid var(--danger); }
        @keyframes toastIn { from { opacity: 0; transform: translateX(30px); } to { opacity: 1; transform: translateX(0); } }
        @keyframes toastOut { to { opacity: 0; transform: translateX(30px); } }
        .empty-state { text-align: center; padding: 60px 24px; color: var(--text-muted); }
        .empty-state-icon { font-size: 2.8rem; margin-bottom: 14px; opacity: 0.5; }
        .empty-state h3 { font-size: 1.05rem; color: var(--text-secondary); margin-bottom: 4px; }
        .empty-state p { font-size: 0.86rem; }
        .stats-bar {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px; margin-bottom: 24px;
        }
        .stat-card {
            background: var(--bg-card); border: 1.5px solid var(--border-light);
            border-radius: var(--radius); padding: 14px; text-align: center;
        }
        .stat-number { font-family: var(--font-display); font-size: 1.5rem; font-weight: 700; color: var(--accent); }
        .stat-label { font-size: 0.72rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-top: 2px; }

        @media (max-width: 768px) {
            .header-inner { padding: 10px 16px; }
            .logo h1 { font-size: 1.1rem; }
            .logo-sub { display: none; }
            .header-user { display: none; }
            .mobile-user { display: block; padding: 10px 16px; background: var(--bg-surface); border-bottom: 1px solid var(--border); }
            .mobile-user input { width: 100%; padding: 10px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); font-size: 0.88rem; font-family: var(--font-body); }
            .mobile-user input:focus { outline: none; border-color: var(--accent); }
            .tabs-wrapper { top: 52px; }
            .tab { padding: 11px 16px; font-size: 0.8rem; }
            .content { padding: 14px 14px 120px; }
            .products-grid { grid-template-columns: 1fr; gap: 10px; }
            .cart-summary-content { flex-direction: column; text-align: center; padding: 10px 16px; gap: 8px; }
            .cart-item { flex-direction: column; align-items: flex-start; gap: 10px; }
            .cart-item-right { width: 100%; justify-content: space-between; }
            .admin-toolbar { flex-direction: column; }
            table { font-size: 0.76rem; }
            th, td { padding: 7px 8px; }
            .toast-container { right: 10px; left: 10px; }
            .toast { max-width: 100%; }
        }
        @media (min-width: 769px) { .mobile-user { display: none; } }
        html { scroll-behavior: smooth; }
        .product-card:nth-child(1) { animation-delay: 0s; }
        .product-card:nth-child(2) { animation-delay: 0.04s; }
        .product-card:nth-child(3) { animation-delay: 0.06s; }
        .product-card:nth-child(4) { animation-delay: 0.08s; }
        .product-card:nth-child(5) { animation-delay: 0.1s; }
        .product-card:nth-child(6) { animation-delay: 0.12s; }
        .product-card:nth-child(n+7) { animation-delay: 0.14s; }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div class="logo">
                <div class="logo-icon">🍃</div>
                <div>
                    <h1>Compras Coletivas</h1>
                    <div class="logo-sub">Vida Forte Nutrientes</div>
                </div>
            </div>
            <div class="header-user">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <input type="text" id="userName" placeholder="Seu nome completo" />
            </div>
        </div>
    </header>
    <div class="mobile-user">
        <input type="text" id="userNameMobile" placeholder="Seu nome completo" />
    </div>
    <div class="tabs-wrapper">
        <div class="tabs">
            <button class="tab active" data-tab="produtos">📦 Produtos</button>
            <button class="tab" data-tab="meu-pedido">🛍️ Meu Pedido</button>
            <button class="tab" data-tab="admin">📊 Administração</button>
        </div>
    </div>
    <div class="content">
        <div id="tab-produtos" class="tab-content">
            <div class="search-wrapper">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
                <input type="text" id="searchInput" placeholder="Buscar por nome ou código do produto..." />
            </div>
            <div class="search-count" id="searchCount"></div>
            <div id="productsGrid" class="products-grid"></div>
        </div>
        <div id="tab-meu-pedido" class="tab-content hidden">
            <div id="myCartContent"></div>
        </div>
        <div id="tab-admin" class="tab-content hidden">
            <div id="adminLoginSection" class="admin-login">
                <h2>Acesso Administrativo</h2>
                <p>Digite a senha para acessar relatórios e gerenciar pedidos</p>
                <input type="password" id="adminPassword" placeholder="Senha do administrador" onkeydown="if(event.key==='Enter')app.loginAdmin()" />
                <button class="btn btn-primary" style="width:100%;" onclick="app.loginAdmin()">Acessar Painel</button>
            </div>
            <div id="adminContent" class="hidden"></div>
        </div>
    </div>
    <div class="cart-summary empty" id="cartSummary">
        <div class="cart-summary-content">
            <div class="cart-info">
                <span class="cart-items-count" id="cartItemsCount"></span>
                <span class="cart-total" id="cartTotal"></span>
            </div>
            <div style="display:flex;gap:10px;">
                <button class="btn btn-secondary" onclick="app.switchTab('meu-pedido')">Ver Pedido</button>
                <button class="btn btn-primary" onclick="app.finalizeOrder()">Finalizar Pedido</button>
            </div>
        </div>
    </div>
    <div class="toast-container" id="toastContainer"></div>
    <script src="produtos.js"></script>
    <script src="app.js"></script>
</body>
</html>
