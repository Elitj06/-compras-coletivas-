<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compras Coletivas - Vida Forte Nutrientes</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    <style>
        :root{--bg:#FAF9F6;--bg-card:#FFF;--bg-surface:#F3F1EC;--text:#1A1A19;--text2:#6B6B67;--muted:#9C9C96;--accent:#2D6A4F;--accent-l:#40916C;--accent-bg:#D8F3DC;--accent-s:#EDF7F0;--border:#E8E6E1;--border-l:#F0EEE9;--danger:#C1292E;--danger-bg:#FDECEA;--warn:#E07C24;--shadow:0 4px 12px rgba(26,26,25,.08);--r:12px;--rs:8px;--fd:'Playfair Display',Georgia,serif;--fb:'DM Sans',-apple-system,sans-serif;--t:.25s cubic-bezier(.4,0,.2,1)}
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:var(--fb);background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
        .header{background:var(--accent);color:#fff;position:sticky;top:0;z-index:100;box-shadow:0 2px 20px rgba(45,106,79,.25)}.header-inner{max-width:1280px;margin:0 auto;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;gap:12px}.logo{display:flex;align-items:center;gap:10px}.logo-icon{width:38px;height:38px;background:rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px}.logo h1{font-family:var(--fd);font-size:1.2rem;font-weight:700}.logo-sub{font-size:.68rem;opacity:.75;letter-spacing:.04em;text-transform:uppercase}.header-user{display:flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);border-radius:var(--rs);padding:5px 12px}.header-user svg{opacity:.7}#userName{background:none;border:none;color:#fff;font-size:.85rem;font-family:var(--fb);width:160px;outline:none}#userName::placeholder{color:rgba(255,255,255,.5)}
        .tabs-wrap{background:var(--bg-card);border-bottom:1px solid var(--border);position:sticky;top:62px;z-index:90}.tabs{max-width:1280px;margin:0 auto;display:flex;overflow-x:auto;scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}.tab{padding:12px 20px;cursor:pointer;border:none;background:none;font-size:.82rem;font-weight:500;color:var(--text2);transition:var(--t);white-space:nowrap;position:relative;font-family:var(--fb)}.tab:hover{color:var(--accent)}.tab.active{color:var(--accent);font-weight:600}.tab.active::after{content:'';position:absolute;bottom:0;left:10px;right:10px;height:2.5px;background:var(--accent);border-radius:2px 2px 0 0}
        .content{max-width:1280px;margin:0 auto;padding:20px 24px 120px}.hidden{display:none!important}
        .toolbar{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap;align-items:center}.search-wrap{position:relative;flex:1;min-width:200px}.search-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--muted)}#searchInput{width:100%;padding:11px 14px 11px 42px;font-size:.88rem;font-family:var(--fb);border:1.5px solid var(--border);border-radius:var(--r);background:var(--bg-card);color:var(--text);transition:var(--t)}#searchInput:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(45,106,79,.1)}#searchInput::placeholder{color:var(--muted)}
        .cat-pills{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding:4px 0;margin-bottom:12px}.cat-pills::-webkit-scrollbar{display:none}.cat-pill{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg-card);font-size:.74rem;font-weight:500;cursor:pointer;white-space:nowrap;transition:var(--t);font-family:var(--fb);color:var(--text2)}.cat-pill:hover{border-color:var(--accent);color:var(--accent)}.cat-pill.active{background:var(--accent);color:#fff;border-color:var(--accent)}

/* Category Grid Selector */
.category-selector{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:10px;margin-bottom:20px}.cat-card{background:var(--bg-card);border:2px solid var(--border);border-radius:var(--r);padding:14px 12px;text-align:center;cursor:pointer;transition:var(--t)}.cat-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow)}.cat-card.active{border-color:var(--accent);background:var(--accent-s)}.cat-card-icon{font-size:1.8rem;margin-bottom:6px}.cat-card-name{font-size:.78rem;font-weight:600;color:var(--text)}.cat-card.active .cat-card-name{color:var(--accent)}.cat-card-count{font-size:.68rem;color:var(--muted);margin-top:3px}

/* Product card improvements */
.product-card.no-image{border-style:dashed}.product-card.no-image .product-no-img{height:130px;background:var(--bg-surface);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;text-align:center}.product-card.no-image .product-no-img-code{font-size:1.1rem;font-weight:700;color:var(--accent);margin-bottom:4px}.product-card.no-image .product-no-img-name{font-size:.7rem;color:var(--text2);line-height:1.3}

/* Pagination */
.pagination{display:flex;justify-content:center;align-items:center;gap:8px;margin-top:20px;padding:15px}.page-btn{width:40px;height:40px;border:1.5px solid var(--border);background:var(--bg-card);border-radius:var(--r);font-size:.9rem;font-weight:600;cursor:pointer;transition:var(--t);display:flex;align-items:center;justify-content:center;color:var(--text)}.page-btn:hover{border-color:var(--accent);color:var(--accent)}.page-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}.page-btn:disabled{opacity:.4;cursor:not-allowed}.page-info{font-size:.8rem;color:var(--text2);padding:0 12px}
        .search-count{font-size:.76rem;color:var(--muted);margin-bottom:10px}
        .products-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
        .product-card{background:var(--bg-card);border-radius:var(--r);border:1.5px solid var(--border-l);transition:var(--t);overflow:hidden;animation:fadeUp .35s ease both}@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.product-card:hover{border-color:var(--accent);box-shadow:var(--shadow);transform:translateY(-2px)}.product-card.has-qty{border-color:var(--accent);background:var(--accent-s)}
        .product-img{width:100%;height:130px;object-fit:contain;background:var(--bg-surface);display:block;padding:6px}.no-img{width:100%;height:130px;background:var(--bg-surface);display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:.75rem}
        .product-body{padding:12px 14px}.product-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}.product-code{font-size:.66rem;font-weight:600;color:var(--accent);background:var(--accent-s);padding:2px 6px;border-radius:5px}.product-emb{font-size:.66rem;color:var(--muted);background:var(--bg-surface);padding:2px 6px;border-radius:5px}.product-name{font-size:.82rem;margin-bottom:8px;color:var(--text);font-weight:500;line-height:1.3;min-height:2.1em}
        .product-prices{display:flex;align-items:baseline;gap:8px;margin-bottom:10px;flex-wrap:wrap}.price-full{font-family:var(--fd);font-size:1.2rem;color:var(--accent);font-weight:700}.price-discount{font-family:var(--fd);font-size:1.1rem;color:var(--danger);font-weight:700}.price-full.struck{text-decoration:line-through;color:var(--muted);font-size:.85rem;font-weight:400}.discount-badge{font-size:.66rem;background:var(--danger);color:#fff;padding:2px 5px;border-radius:4px;font-weight:600}
        .quantity-control{display:flex;align-items:center;gap:6px}.qty-btn{width:32px;height:32px;border:1.5px solid var(--border);background:var(--bg-card);color:var(--text);border-radius:var(--rs);font-size:16px;cursor:pointer;transition:var(--t);display:flex;align-items:center;justify-content:center}.qty-btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}.qty-btn:active{transform:scale(.9)}.qty-input{width:46px;text-align:center;padding:5px 2px;font-size:.85rem;font-family:var(--fb);font-weight:600;border:1.5px solid var(--border);border-radius:var(--rs);color:var(--text);background:var(--bg-surface)}.qty-input:focus{outline:none;border-color:var(--accent)}.product-card.has-qty .qty-input{background:#fff;border-color:var(--accent);color:var(--accent)}
        .cart-bar{position:fixed;bottom:0;left:0;right:0;background:var(--bg-card);border-top:1.5px solid var(--border);box-shadow:0 -4px 20px rgba(26,26,25,.1);z-index:80;transition:transform .3s ease}.cart-bar.empty{transform:translateY(100%)}.cart-bar-inner{max-width:1280px;margin:0 auto;padding:12px 24px;display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}.cart-info{display:flex;align-items:center;gap:12px;flex-wrap:wrap}.cart-count{font-size:.8rem;color:var(--text2)}.cart-count strong{color:var(--accent)}.cart-total{font-family:var(--fd);font-size:1.1rem;font-weight:700}.cart-total-disc{font-size:.85rem;color:var(--danger);font-weight:600}
        .btn{padding:9px 18px;font-size:.8rem;font-weight:600;border:none;border-radius:var(--rs);cursor:pointer;transition:var(--t);font-family:var(--fb);display:inline-flex;align-items:center;gap:5px}.btn:active{transform:scale(.96)}.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent-l)}.btn-secondary{background:var(--bg-surface);color:var(--text);border:1.5px solid var(--border)}.btn-secondary:hover{border-color:var(--accent);color:var(--accent)}.btn-danger{background:var(--danger);color:#fff}.btn-success{background:var(--accent);color:#fff}.btn-sm{padding:5px 10px;font-size:.74rem}
        .cart-item{background:var(--bg-card);border:1.5px solid var(--border-l);padding:12px 14px;border-radius:var(--r);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center;transition:var(--t);animation:fadeUp .3s ease both}.cart-item:hover{border-color:var(--border)}.cart-item-info h4{font-size:.82rem;font-weight:500;margin-bottom:2px}.cart-item-info small{color:var(--muted);font-size:.73rem}.cart-item-right{display:flex;align-items:center;gap:10px}.cart-item-prices{text-align:right}.cart-item-subtotal{font-family:var(--fd);font-weight:700;font-size:.9rem;color:var(--accent)}.cart-item-disc{font-size:.75rem;color:var(--danger);font-weight:600}.btn-remove{width:26px;height:26px;border:1.5px solid var(--border);background:#fff;border-radius:var(--rs);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:var(--t);color:var(--muted)}.btn-remove:hover{background:var(--danger-bg);border-color:var(--danger);color:var(--danger)}
        .order-total-bar{margin-top:16px;padding:16px 20px;background:var(--accent);color:#fff;border-radius:var(--r)}.order-total-bar h2{font-family:var(--fd);font-size:1.15rem}.order-total-line{display:flex;justify-content:space-between;align-items:center;margin-top:6px;font-size:.88rem;opacity:.9}
        .user-badge{background:var(--accent-bg);color:var(--accent);padding:8px 14px;border-radius:var(--rs);margin-bottom:16px;font-size:.82rem;display:flex;align-items:center;gap:6px}
        .admin-login{max-width:340px;margin:50px auto;text-align:center}.admin-login h2{font-family:var(--fd);font-size:1.3rem;margin-bottom:6px}.admin-login p{color:var(--text2);font-size:.82rem;margin-bottom:20px}.admin-login input{width:100%;padding:12px;font-size:.88rem;font-family:var(--fb);border:1.5px solid var(--border);border-radius:var(--rs);margin-bottom:12px;text-align:center}.admin-login input:focus{outline:none;border-color:var(--accent)}
        .admin-toolbar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
        .discount-panel{background:var(--bg-card);border:1.5px solid var(--accent-bg);border-radius:var(--r);padding:16px 18px;margin-bottom:20px}.discount-panel h3{font-size:.9rem;font-weight:600;margin-bottom:10px}.discount-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin-bottom:8px}.discount-row label{font-size:.8rem;color:var(--text2);min-width:70px}.discount-row input,.discount-row select{padding:7px 10px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:.82rem;font-family:var(--fb)}.discount-row input:focus,.discount-row select:focus{outline:none;border-color:var(--accent)}
        .stats-bar{display:grid;grid-template-columns:repeat(auto-fit,minmax(110px,1fr));gap:10px;margin-bottom:18px}.stat-card{background:var(--bg-card);border:1.5px solid var(--border-l);border-radius:var(--r);padding:12px;text-align:center}.stat-number{font-family:var(--fd);font-size:1.2rem;font-weight:700;color:var(--accent)}.stat-label{font-size:.66rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
        .report-section{margin-bottom:20px}.report-card{background:var(--bg-card);border:1.5px solid var(--border-l);border-radius:var(--r);overflow:hidden}.report-header{font-size:.88rem;font-weight:600;padding:12px 14px;background:var(--bg-surface);border-bottom:1px solid var(--border)}table{width:100%;border-collapse:collapse}th,td{padding:7px 10px;text-align:left;font-size:.76rem}th{background:var(--accent);color:#fff;font-weight:500;font-size:.7rem;text-transform:uppercase;letter-spacing:.03em}td{border-bottom:1px solid var(--border-l)}tr:last-child td{border-bottom:none}tr:hover td{background:var(--accent-s)}.total-row td{background:var(--accent-bg)!important;font-weight:700;color:var(--accent)}.user-section-header{padding:10px 14px;background:var(--bg-surface);font-weight:600;font-size:.82rem;color:var(--accent);border-bottom:1px solid var(--border)}.user-total-row{padding:8px 14px;text-align:right;font-weight:600;font-size:.8rem;background:var(--accent-s);border-bottom:1.5px solid var(--border)}
        .alert{padding:10px 14px;border-radius:var(--rs);margin-bottom:12px;font-size:.8rem}.alert-info{background:#EBF5FB;color:#1B4F72;border:1px solid #AED6F1}.alert-success{background:var(--accent-bg);color:var(--accent);border:1px solid #B7E4C7}
        .toast-container{position:fixed;top:70px;right:14px;z-index:999;display:flex;flex-direction:column;gap:6px}.toast{background:var(--bg-card);border:1.5px solid var(--border);border-radius:var(--rs);padding:10px 14px;font-size:.78rem;display:flex;align-items:center;gap:6px;box-shadow:0 8px 30px rgba(26,26,25,.12);animation:toastIn .3s ease,toastOut .3s ease 2.5s forwards;max-width:280px}.toast-success{border-left:3px solid var(--accent)}.toast-error{border-left:3px solid var(--danger)}@keyframes toastIn{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}@keyframes toastOut{to{opacity:0;transform:translateX(20px)}}
        .empty-state{text-align:center;padding:50px 20px;color:var(--muted)}.empty-state-icon{font-size:2.5rem;margin-bottom:12px;opacity:.5}.empty-state h3{font-size:1rem;color:var(--text2);margin-bottom:4px}.empty-state p{font-size:.8rem}
        @media(max-width:768px){.header-inner{padding:10px 14px}.logo h1{font-size:1rem}.logo-sub{display:none}.header-user{display:none}.mobile-user{display:block;padding:8px 14px;background:var(--bg-surface);border-bottom:1px solid var(--border)}.mobile-user input{width:100%;padding:9px 12px;border:1.5px solid var(--border);border-radius:var(--rs);font-size:.85rem;font-family:var(--fb)}.mobile-user input:focus{outline:none;border-color:var(--accent)}.tabs-wrap{top:50px}.tab{padding:10px 12px;font-size:.76rem}.content{padding:10px 10px 120px}.products-grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:8px}.product-img,.no-img{height:90px}.product-body{padding:8px 10px}.product-name{font-size:.74rem;min-height:1.8em}.price-full{font-size:1rem}.price-discount{font-size:.85rem}.cart-bar-inner{flex-direction:column;text-align:center;padding:8px 14px;gap:6px}.cart-item{flex-direction:column;align-items:flex-start;gap:8px}.cart-item-right{width:100%;justify-content:space-between}.admin-toolbar,.discount-row{flex-direction:column;align-items:flex-start}table{font-size:.7rem}th,td{padding:5px 6px}.toast-container{right:8px;left:8px}.toast{max-width:100%}}
        @media(min-width:769px){.mobile-user{display:none}}html{scroll-behavior:smooth}
    </style>
</head>
<body>
    <header class="header"><div class="header-inner"><div class="logo"><div class="logo-icon">🍃</div><div><h1>Compras Coletivas</h1><div class="logo-sub">Vida Forte · Março 2026</div></div></div><div class="header-user"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg><input type="text" id="userName" placeholder="Seu nome completo"/></div></div></header>
    <div class="mobile-user"><input type="text" id="userNameMobile" placeholder="Seu nome completo"/></div>
    <div class="tabs-wrap"><div class="tabs"><button class="tab active" data-tab="produtos">📦 Produtos</button><button class="tab" data-tab="meu-pedido">🛍️ Meu Pedido</button><button class="tab" data-tab="admin">📊 Admin</button></div></div>
    <div class="content">
        <div id="tab-produtos" class="tab-content">
            <div class="toolbar"><div class="search-wrap"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg><input type="text" id="searchInput" placeholder="Buscar produto ou código..."/></div><button class="btn btn-secondary" id="toggleCatBtn" onclick="app.toggleCategories()">📂 Categorias</button></div>
            <div id="categoryGrid" class="category-selector hidden"></div>
            <div class="cat-pills" id="catPills"></div>
            <div class="search-count" id="searchCount"></div>
            <div id="productsGrid" class="products-grid"></div>
            <div class="pagination" id="pagination"></div>
        </div>
        <div id="tab-meu-pedido" class="tab-content hidden"><div id="myCartContent"></div></div>
        <div id="tab-admin" class="tab-content hidden"><div id="adminLoginSection" class="admin-login"><h2>Acesso Administrativo</h2><p>Digite a senha para acessar o painel</p><input type="password" id="adminPassword" placeholder="Senha" onkeydown="if(event.key==='Enter')app.loginAdmin()"/><button class="btn btn-primary" style="width:100%" onclick="app.loginAdmin()">Acessar</button></div><div id="adminContent" class="hidden"></div></div>
    </div>
    <div class="cart-bar empty" id="cartBar"><div class="cart-bar-inner"><div class="cart-info"><span class="cart-count" id="cartCount"></span><span class="cart-total" id="cartTotal"></span><span class="cart-total-disc" id="cartTotalDisc"></span></div><div style="display:flex;gap:8px"><button class="btn btn-secondary" onclick="app.switchTab('meu-pedido')">Ver Pedido</button><button class="btn btn-primary" onclick="app.finalizeOrder()">Finalizar</button></div></div></div>
    <div class="toast-container" id="toastContainer"></div>
    <script src="produtos.js"></script>
    <script src="app.js"></script>
</body>
</html>
